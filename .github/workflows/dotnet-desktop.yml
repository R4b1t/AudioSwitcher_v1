# Build Audio Switcher (WinForms, .NET Framework 4.5.2)
name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore FortyOne.AudioSwitcher.sln -Source https://api.nuget.org/v3/index.json

    # This app is classic .NET Framework WinForms (not .NET Core / MSIX).
    # Release signing uses a local pfx — disable signing in CI.
    - name: Build AudioSwitcher GUI
      run: >
        msbuild FortyOne.AudioSwitcher\FortyOne.AudioSwitcher.GUI.csproj
        /p:Configuration=${{ matrix.configuration }}
        /p:Platform=AnyCPU
        /p:SignAssembly=false
        /m
        /v:m

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AudioSwitcher-${{ matrix.configuration }}
        path: |
          FortyOne.AudioSwitcher/bin/${{ matrix.configuration }}/AudioSwitcher.exe
          FortyOne.AudioSwitcher/bin/${{ matrix.configuration }}/*.dll
          FortyOne.AudioSwitcher/bin/${{ matrix.configuration }}/*.config
        if-no-files-found: error
